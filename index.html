<meta charset="utf-8">

<body style="font-family:Arial;padding:20px">
<h2>Lead Splitter Pro</h2>

<p>Lead File:</p>
<input type="file" id="leadFile"><br><br>

<p>Group File:</p>
<input type="file" id="groupFile"><br><br>

<select id="groupSelect"></select>
<button onclick="processData()">Process</button>

<div id="out"></div>

": "KY", "860": "CT", "862": "NJ", "863": "FL", "864": "SC", "865": "TN", "867": "YT", "870": "AR", "872": "IL", "873": "QC", "878": "PA", "901": "TN", "902": "NS", "903": "TX", "904": "FL", "905": "ON", "906": "MI", "907": "AK", "908": "NJ", "909": "CA", "910": "NC", "912": "GA", "913": "KS", "914": "NY", "915": "TX", "916": "CA", "917": "NY", "918": "OK", "919": "NC", "920": "WI", "925": "CA", "927": "FL", "928": "AZ", "929": "NY", "931": "TN", "935": "CA", "936": "TX", "937": "OH", "939": "PR", "940": "TX", "941": "FL", "947": "MI", "949": "CA", "951": "CA", "952": "MN", "954": "FL", "956": "TX", "957": "NM", "959": "CT", "970": "CO", "971": "OR", "972": "TX", "973": "NJ", "975": "MO", "978": "MA", "979": "TX", "980": "NC", "983": "CO", "984": "NC", "985": "LA", "989": "MI"};

let groups={};

document.getElementById('groupFile').addEventListener('change', async e=>{
 const text=await e.target.files[0].text();
 let current=null;
 text.split(/\r?\n/).forEach(line=>{
   line=line.trim();
   if(!line) return;
   if(line.startsWith('[')&&line.endsWith(']')){
      current=line.slice(1,-1);
      groups[current]=[];
   } else if(current) {
      groups[current].push(line.toUpperCase());
   }
 });
 let sel=document.getElementById('groupSelect');
 sel.innerHTML='';
 Object.keys(groups).forEach(g=>{
   let o=document.createElement('option');
   o.value=g;o.text=g;
   sel.add(o);
 });
});

function tz(st){
 if(['CT','DC','DE','FL','GA','IN','KY','MA','MD','MI','NC','NH','NJ','NY','OH','PA','VA'].includes(st)) return 'EST';
 if(['AL','AR','IA','LA','MN','MO','MS','NE','ND','OK','TN','TX'].includes(st)) return 'CST';
 if(['AZ','CO','ID','NM','WY'].includes(st)) return 'MST';
 if(['CA','NV','WA'].includes(st)) return 'PST';
 return 'OTHER';
}

function download(name,data){
 let ws=XLSX.utils.json_to_sheet(data);
 let wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,'Data');
 XLSX.writeFile(wb,name);
}

async function processData(){
 const file=document.getElementById('leadFile').files[0];
 const buf=await file.arrayBuffer();
 const wb=XLSX.read(buf);
 const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

 const allowed=groups[document.getElementById('groupSelect').value]||[];
 const seen=new Set();
 const result=[];

 rows.forEach(r=>{
   let phone=String(r.Phone||r.phone||Object.values(r)[0]||'').replace(/\D/g,'');
   if(phone.length<10) return;

   phone=phone.slice(-10);

   if(seen.has(phone)) return;
   seen.add(phone);

   let area=phone.substring(0,3);
   let state=AREA_MAP[area];
   if(!state) return;
   if(allowed.length && !allowed.includes(state)) return;

   r.Phone=phone;
   r.AreaCode=area;
   r.State=state;
   r.Timezone=tz(state);
   result.push(r);
 });

 download('ALL.xlsx',result);

 ['EST','CST','MST','PST'].forEach(z=>{
   download(z+'.xlsx', result.filter(x=>x.Timezone===z));
 });

 document.getElementById('out').innerHTML='Processed '+result.length+' records';
}
</script>
</body>
</html>
