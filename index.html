<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Splitter</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;padding:20px;max-width:1000px;margin:auto}
.box{border:1px solid #ccc;padding:15px;margin:10px 0}
button{padding:8px 12px;margin:5px}
select,input{padding:6px}
</style>
</head>
<body>
<h2>Debt Settlement Lead Splitter</h2>

<div class="box">
<input type="file" id="file">
</div>

<div class="box">
<h3>State Groups</h3>
<input id="groupName" placeholder="Group Name">
<input id="states" placeholder="CA,TX,FL,NY">
<button onclick="saveGroup()">Save Group</button>
<br><br>
<select id="groups"></select>
</div>

<div class="box">
<label><input type="checkbox" id="dedupe" checked> Remove Duplicates</label><br>
<label><input type="checkbox" id="splitTZ" checked> Split Timezones</label><br>
<button onclick="processFile()">Process</button>
</div>

<div id="result"></div>

<script>
const areaMap={};
function loadGroups(){
 let groups=JSON.parse(localStorage.getItem("groups")||"{}");
 let sel=document.getElementById("groups");
 sel.innerHTML="";
 Object.keys(groups).forEach(g=>{
   let o=document.createElement("option");
   o.value=g;o.textContent=g;
   sel.appendChild(o);
 });
}
function saveGroup(){
 let name=document.getElementById("groupName").value.trim();
 let states=document.getElementById("states").value.toUpperCase().split(",");
 let groups=JSON.parse(localStorage.getItem("groups")||"{}");
 groups[name]=states;
 localStorage.setItem("groups",JSON.stringify(groups));
 loadGroups();
}
loadGroups();

function downloadCSV(name,data){
 let ws=XLSX.utils.json_to_sheet(data);
 let csv=XLSX.utils.sheet_to_csv(ws);
 let blob=new Blob([csv],{type:"text/csv"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download=name;
 a.click();
}

function tzFromState(st){
 const EST=['CT','DC','DE','FL','GA','IN','KY','MA','MD','MI','NC','NH','NJ','NY','OH','PA','VA'];
 const CST=['AL','AR','IA','LA','MN','MO','MS','NE','ND','OK','TN','TX'];
 const MST=['AZ','CO','ID','NM','WY'];
 const PST=['CA','NV','WA'];
 if(EST.includes(st)) return 'EST';
 if(CST.includes(st)) return 'CST';
 if(MST.includes(st)) return 'MST';
 if(PST.includes(st)) return 'PST';
 return 'OTHER';
}

async function processFile(){
 let f=document.getElementById('file').files[0];
 if(!f){alert('Select file');return;}
 let groups=JSON.parse(localStorage.getItem("groups")||"{}");
 let grp=document.getElementById("groups").value;
 let allowed=groups[grp]||[];

 let buf=await f.arrayBuffer();
 let wb=XLSX.read(buf);
 let data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

 let seen=new Set();
 let out=[];

 data.forEach(r=>{
   let phone=String(r.Phone||r.phone||Object.values(r)[0]||'').replace(/\D/g,'');
   if(phone.length<10)return;

   if(document.getElementById("dedupe").checked){
      if(seen.has(phone)) return;
      seen.add(phone);
   }

   let area=phone.slice(-10,-7);

   let state=r.State || r.STATE || '';
   if(allowed.length && !allowed.includes(state)) return;

   r.Phone=phone;
   r.Timezone=tzFromState(state);
   out.push(r);
 });

 downloadCSV(grp+"_ALL.csv",out);

 let est=out.filter(x=>x.Timezone==='EST');
 let cst=out.filter(x=>x.Timezone==='CST');
 let mst=out.filter(x=>x.Timezone==='MST');
 let pst=out.filter(x=>x.Timezone==='PST');

 downloadCSV(grp+"_EST.csv",est);
 downloadCSV(grp+"_CST.csv",cst);
 downloadCSV(grp+"_MST.csv",mst);
 downloadCSV(grp+"_PST.csv",pst);

 document.getElementById("result").innerHTML=
   "EST:"+est.length+" CST:"+cst.length+" MST:"+mst.length+" PST:"+pst.length;
}
</script>
</body>
</html>
